# 这是一个虚拟主机配置块，代表了一个网站/服务的对外设置
server {
    # 监听宿主机的 80 端口（HTTP 默认端口）
    listen 80;

    # 服务器的名字。匹配到这个 IP 或域名时，Nginx 才会使用下面这个 server 规则。
    # 比如浏览器请求 http://110.40.154.201/ 就会被这里拦截。
    server_name 110.40.154.201;

    # =============== 静态资源处理区 ===============
    # location / 表示：如果请求的路径是以 `/` 开头（即所有默认请求，比如 index.html、css、js）
    location / {
        # 去这个目录下找对应的文件（这个目录对应 docker-compose.yml 里的 ./nginx/html 映射）
        root   /usr/share/nginx/html;
        # 用户直接请求网站根目录时，默认展示什么页面（比如输入 IP 不加具体文件名时，给它 index.html）
        index  index.html index.htm;
    }

    # =============== API 接口反向代理区 ===============
    # location /api/ 表示：遇到任何以 `/api/` 开头的请求，不要去上面的 root 里找文件了，交给这里处理。
    location /api/ {
        # 1. 核心指令：反向代理。把请求原封不动"转交"给内部 docker 网络里的 `ai-rag-knowledge-app` 容器的 8090 端口
        proxy_pass http://ai-rag-knowledge-app:8090;
        
        # 2. 传递真实 IP：将客户端原本的公网 IP 等信息通过设置请求头传给后端（这样后端拿到的就不是 Nginx 内网 IP，而是真实用户的 IP，常用于做客户端访问频率限制或日志分析）
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        
        # 3. SSE 长连接支持：AI 聊天常见的由于用的是 EventSource (Server-Sent Events) 打字机流式输出，
        # 要求必须用 HTTP/1.1，并且连接不能被 Nginx 中途主动关闭，或者把流数据当静态包缓存起来
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # =============== 错误页面规则区 ===============
    # 如果遇到 500, 502, 503, 504 错误状态码，把用户重定向到内部路径 /50x.html
    error_page   500 502 503 504  /50x.html;
    # 当请求 /50x.html 时去对应的静态文件夹下拿这个报错提示文件展示给用户
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

}